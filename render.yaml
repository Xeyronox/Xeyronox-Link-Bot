services:
  - type: web
    name: xeyronox-link-bot
    env: python
    region: oregon
    plan: free
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 10000
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: production
      - key: RETRY_ATTEMPTS
        value: 3
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /healthz
    autoDeploy: true
    numInstances: 1