services:
  - type: web
    name: xeyronox-link-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false         # Set securely via Render dashboard
      - key: WEBHOOK_URL
        value: https://xeyronox-link-bot.onrender.com/XeyronoxLinkBot
    autoDeploy: true
    plan: free